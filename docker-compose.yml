version: '3.8'

# ============================================
# 4-CONTAINER ARCHITECTURE WITH SECURITY LAYERS
# ============================================

networks:
  # Layer 1: Network Isolation
  api-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.1.0.0/24
    internal: false  # API needs limited internet for updates
  
  internal-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.2.0.0/24
    internal: true  # NO internet access
  
  scanning-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.3.0.0/24
    internal: true  # NO internet access - air-gapped

volumes:
  postgres-data:
  redis-data:
  ml-models:

services:
  # ===== CONTAINER 1: API (Lightweight) =====
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.secure
    image: axr-api:secure
    container_name: axr-api
    ports:
      - "8000:8000"
    
    # Layer 2: Container Security
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/seccomp/api-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Only for binding to port 8000
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    
    # Environment
    environment:
      - ENVIRONMENT=production
      - POSTGRES_DSN=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/orchestrator
      - REDIS_DSN=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ML_WORKER_URL=http://ml-worker:8001
      - LLM_WORKER_URL=http://llm-worker:8002
      - SECURITY_WORKER_URL=http://security-worker:8003
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
    
    # Layer 1: Network Isolation - API connects to all networks
    networks:
      - api-net
      - internal-net
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    restart: unless-stopped
    
    # Layer 4: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== CONTAINER 2: ML WORKER (Heavy) =====
  ml-worker:
    build:
      context: .
      dockerfile: docker/workers/ml/Dockerfile.secure
    image: axr-ml-worker:secure
    container_name: axr-ml-worker
    ports:
      - "8001:8001"
    
    # Layer 2: Container Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/mluser/.cache
    
    environment:
      - REDIS_DSN=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    
    # Layer 1: Network Isolation - ML worker only on internal network
    networks:
      - internal-net
    
    volumes:
      - ml-models:/home/mluser/models
    
    restart: unless-stopped
    
    # Layer 4: Resource Limits (ML needs more resources)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== CONTAINER 3: LLM WORKER (Heavy) =====
  llm-worker:
    build:
      context: .
      dockerfile: docker/workers/llm/Dockerfile.secure
    image: axr-llm-worker:secure
    container_name: axr-llm-worker
    ports:
      - "8002:8002"
    
    # Layer 2: Container Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /home/llmuser/.cache
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOCAL_LLM_URL=http://ollama:11434
    
    # Layer 1: Network Isolation
    networks:
      - internal-net
    
    restart: unless-stopped
    
    # Layer 4: Resource Limits (LLM needs most resources)
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 4G
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== CONTAINER 4: SECURITY WORKER (Light) =====
  security-worker:
    build:
      context: .
      dockerfile: docker/workers/security/nmap/Dockerfile.secure
    image: axr-security-worker:secure
    container_name: axr-security-worker
    ports:
      - "8003:8003"
    
    # Layer 2: Container Security (Most restrictive)
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/seccomp/security-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW  # Required for nmap
      - NET_ADMIN  # Required for some scans
    read_only: true
    tmpfs:
      - /tmp
      - /home/nmap
    
    # Layer 1: Network Isolation - Air-gapped network
    networks:
      - scanning-net  # No internet access
    
    restart: unless-stopped
    
    # Layer 4: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== INFRASTRUCTURE SERVICES =====
  postgres:
    image: postgres:15-alpine
    container_name: axr-postgres
    
    # Layer 2: Container Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    
    environment:
      - POSTGRES_USER=axr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=axr
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    networks:
      - internal-net
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axr-redis
    
    # Layer 2: Container Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    
    volumes:
      - redis-data:/data
    
    networks:
      - internal-net
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== RUNTIME SECURITY (Layer 4) =====
  falco:
    image: falcosecurity/falco:latest
    container_name: axr-falco
    privileged: true  # Required for Falco
    
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./docker/falco/falco_rules.yaml:/etc/falco/falco_rules.yaml
    
    networks:
      - internal-net
    
    restart: unless-stopped