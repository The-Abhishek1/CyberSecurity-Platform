# .github/workflows/cd.yml

name: Continuous Deployment

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy'
        required: true

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Set up Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_STAGING }}
      
      - name: Install Helm
        uses: azure/setup-helm@v3
      
      - name: Deploy with Helm
        run: |
          helm upgrade --install orchestrator ./infrastructure/kubernetes/helm/orchestrator \
            --namespace staging \
            --create-namespace \
            --set image.repository=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }} \
            --set image.tag=${{ github.event.inputs.version || github.ref_name }} \
            --set environment=staging \
            --set database.host=${{ secrets.STAGING_DB_HOST }} \
            --set redis.host=${{ secrets.STAGING_REDIS_HOST }} \
            --set rabbitmq.host=${{ secrets.STAGING_RABBITMQ_HOST }} \
            --values ./infrastructure/kubernetes/overlays/staging/values.yaml \
            --wait \
            --timeout 10m
      
      - name: Run smoke tests
        run: |
          ./scripts/smoke-test.sh staging
      
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
  
  deploy-production:
    name: Deploy to Production
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    concurrency: production
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Set up Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_PROD }}
      
      - name: Install Helm
        uses: azure/setup-helm@v3
      
      - name: Deploy with Helm (Blue/Green)
        run: |
          # Deploy green version
          helm upgrade --install orchestrator-green ./infrastructure/kubernetes/helm/orchestrator \
            --namespace production \
            --create-namespace \
            --set image.repository=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }} \
            --set image.tag=${{ github.event.inputs.version || github.ref_name }} \
            --set environment=production \
            --set database.host=${{ secrets.PROD_DB_HOST }} \
            --set redis.host=${{ secrets.PROD_REDIS_HOST }} \
            --set rabbitmq.host=${{ secrets.PROD_RABBITMQ_HOST }} \
            --set deployment.color=green \
            --values ./infrastructure/kubernetes/overlays/production/values.yaml \
            --wait \
            --timeout 15m
          
          # Run integration tests against green
          ./scripts/smoke-test.sh production-green
          
          # Switch traffic to green
          kubectl patch service orchestrator -n production -p '{"spec":{"selector":{"color":"green"}}}'
          
          # Keep blue for rollback
      
      - name: Run canary analysis
        run: |
          ./scripts/canary-analysis.sh production
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          mention: 'channel'
          if_mention: failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
  
  rollback:
    name: Rollback if needed
    runs-on: ubuntu-latest
    if: failure()
    needs: deploy-production
    
    steps:
      - name: Rollback to previous version
        run: |
          kubectl patch service orchestrator -n production -p '{"spec":{"selector":{"color":"blue"}}}'
          kubectl delete deployment orchestrator-green -n production
      
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Deployment failed! Rolling back to previous version."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}