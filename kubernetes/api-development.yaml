apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker
  namespace: security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-orchestrator
      component: ml-worker
  template:
    metadata:
      labels:
        app: security-orchestrator
        component: ml-worker
    spec:
      containers:
      - name: ml-worker
        image: security-orchestrator/ml-worker:latest
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_DSN
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets
              key: redis-dsn
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ml-worker
  namespace: security
spec:
  selector:
    app: security-orchestrator
    component: ml-worker
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP